<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UNIKER GitHub Practice</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0b0f;
        color: #f7f7fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100vw - 40px));
        border-top: 6px solid #ff2f67;
        background: #15151b;
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 6vw, 64px);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #d8d8e0;
        font-size: 20px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GitHub Practice</h1>
      <p>Codex에게 commit, push, pull, merge 흐름을 맡겨보는 안전한 연습용 repo입니다.</p>
    </main>
  </body>
</html>
